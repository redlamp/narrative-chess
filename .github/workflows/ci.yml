name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Type-check
        run: bunx tsc --noEmit

      - name: Detect e2e specs
        id: detect_e2e
        shell: bash
        run: |
          if compgen -G "e2e/**/*.spec.ts" > /dev/null 2>&1; then
            echo "has_specs=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_specs=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No Playwright specs found under e2e/ — skipping e2e step (will activate when Phase 3+ adds specs)"
          fi

      - name: Install Playwright browsers
        if: steps.detect_e2e.outputs.has_specs == 'true'
        run: bunx playwright install --with-deps chromium

      - name: Run e2e
        if: steps.detect_e2e.outputs.has_specs == 'true'
        run: bunx playwright test
        env:
          CI: true
